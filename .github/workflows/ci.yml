name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --no-editable

      - name: Import check
        run: uv run --no-editable python -c "from fid_coder.tools import TOOL_REGISTRY; from fid_coder.agents.agent_manager import get_available_agents; assert 'browser_navigate' in TOOL_REGISTRY; assert 'qa-kitten' in get_available_agents(); print('ok', len(TOOL_REGISTRY), 'tools')"

      - name: CLI help
        run: uv run --no-editable fid-coder --help
